<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="33%"  stop-color="#3b82f6"/>
      <stop offset="66%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <!-- Prism outline -->
  <polygon points="64,8 10,112 118,112" fill="none" stroke="#7c3aed" stroke-width="5.5" stroke-linejoin="round"/>
  <!-- Refracted rays from apex -->
  <line x1="64" y1="58" x2="22"  y2="112" stroke="url(#g)" stroke-width="3.5" opacity="0.85"/>
  <line x1="64" y1="58" x2="41"  y2="112" stroke="url(#g)" stroke-width="3.5" opacity="0.75"/>
  <line x1="64" y1="58" x2="64"  y2="112" stroke="url(#g)" stroke-width="3.5" opacity="0.75"/>
  <line x1="64" y1="58" x2="87"  y2="112" stroke="url(#g)" stroke-width="3.5" opacity="0.75"/>
  <line x1="64" y1="58" x2="106" y2="112" stroke="url(#g)" stroke-width="3.5" opacity="0.85"/>
  <!-- Light input ray -->
  <line x1="64" y1="8" x2="64" y2="58" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
</svg>
